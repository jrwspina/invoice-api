services:
  db:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:8
    ports: 
      - "6379:6379"
    command: 
      - redis-server
    volumes:
      - redis-data:/data
            
volumes:
  db-data:
  redis-data: