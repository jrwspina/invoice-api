services:
  db:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:8
    ports: 
      - "6379:6379"
    volumes:
      - redis-data:/data
  worker:
    build: .
    command: ["celery", "-A", "app.celery", "worker", "--loglevel=INFO"]
    depends_on:
      - redis
      - db
    environment:
      - REDIS_URL=redis://redis:6379/0
    
volumes:
  db-data:
  redis-data: